name: Nightly Build

on:
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: lazytail
            asset_name: lazytail-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: lazytail
            asset_name: lazytail-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: lazytail
            asset_name: lazytail-macos-aarch64

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Patch version with nightly suffix
      run: |
        VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
        sed -i.bak "s/^version = \"$VERSION\"/version = \"$VERSION-nightly\"/" Cargo.toml
        echo "NIGHTLY_VERSION=$VERSION-nightly" >> "$GITHUB_ENV"

    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --features self-update

    - name: Strip binary (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - name: Strip binary (macOS)
      if: matrix.os == 'macos-latest'
      run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

    - name: Compress binary
      run: |
        cd target/${{ matrix.target }}/release
        tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
        mv ${{ matrix.asset_name }}.tar.gz ../../..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ./${{ matrix.asset_name }}.tar.gz

  publish-release:
    name: Publish Nightly Release
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Delete existing nightly tag and release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        git push origin :refs/tags/nightly 2>/dev/null || true

    - name: Create nightly tag
      run: |
        git tag nightly
        git push origin nightly

    - name: Create nightly release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: nightly
        prerelease: true
        name: "Nightly Build"
        body: |
          Automated nightly build from `master` branch.

          **Commit:** ${{ github.sha }}
          **Date:** ${{ github.event.head_commit.timestamp }}

          > ⚠️ This is an unstable pre-release build. Use `lazytail update` for stable releases.
          > Install nightly with: `lazytail update --nightly`
        files: artifacts/**/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
